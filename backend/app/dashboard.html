<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureSight</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
<style>
:root {
  --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a25; --border: #2a2a3a;
  --text: #e0e0e8; --text2: #8888a0; --text3: #555568;
  --blue: #4a9eff; --purple: #8b5cf6; --cyan: #06b6d4;
  --green: #10b981; --amber: #f59e0b; --red: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); }

/* Layout */
.shell { display:flex; min-height:100vh; }
nav { width:200px; background:var(--bg2); border-right:1px solid var(--border); padding:20px 0; flex-shrink:0; position:sticky; top:0; height:100vh; overflow-y:auto; }
main { flex:1; padding:24px 32px; overflow-y:auto; max-width:1200px; }
@media(max-width:800px) { nav{display:none} main{padding:16px} }

.logo { padding:0 20px 24px; font-size:18px; font-weight:700; color:var(--blue); }
.logo span { color:var(--text2); font-weight:400; font-size:11px; display:block; margin-top:2px; }
.nav-item { display:block; padding:10px 20px; color:var(--text2); text-decoration:none; cursor:pointer; border-left:3px solid transparent; font-size:13px; }
.nav-item:hover,.nav-item.active { color:var(--text); background:var(--bg3); border-left-color:var(--blue); }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:16px; }
.card h3 { font-size:13px; color:var(--text2); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.5px; }

/* Stats */
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:20px; }
.stat { text-align:center; padding:16px; }
.stat .value { font-size:26px; font-weight:700; color:var(--blue); }
.stat .label { font-size:11px; color:var(--text2); margin-top:4px; }

/* Grid */
.grid-2 { display:grid; grid-template-columns:2fr 1fr; gap:16px; }
@media(max-width:900px) { .grid-2{grid-template-columns:1fr} }

/* Bars */
.bar-row { display:flex; align-items:center; margin-bottom:8px; font-size:12px; }
.bar-row .name { width:80px; color:var(--text2); }
.bar-bg { flex:1; height:6px; background:var(--bg); border-radius:3px; margin:0 8px; }
.bar-fill { height:100%; border-radius:3px; transition:width 0.4s; }
.bar-row .count { width:40px; text-align:right; color:var(--text2); font-size:11px; }

/* Market cards */
.market { padding:14px 0; border-bottom:1px solid var(--border); display:flex; gap:16px; align-items:flex-start; }
.market:last-child { border-bottom:none; }
.market-prob { min-width:64px; text-align:center; flex-shrink:0; }
.market-prob .pct { font-size:22px; font-weight:700; line-height:1; }
.market-prob .dir { font-size:10px; margin-top:2px; }
.market-body { flex:1; min-width:0; }
.market-title { font-size:14px; font-weight:500; line-height:1.3; margin-bottom:4px; }
.market-desc { font-size:12px; color:var(--text2); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:6px; }
.market-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

/* Outcomes */
.outcomes { display:flex; gap:4px; margin-top:6px; }
.outcome { font-size:11px; padding:2px 8px; border-radius:4px; background:var(--bg3); }
.outcome-yes { color:var(--green); }
.outcome-no { color:var(--red); }

/* Badges */
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:500; }
.b-blue { background:rgba(74,158,255,0.12); color:var(--blue); }
.b-purple { background:rgba(139,92,246,0.12); color:var(--purple); }
.b-green { background:rgba(16,185,129,0.12); color:var(--green); }
.b-amber { background:rgba(245,158,11,0.12); color:var(--amber); }
.b-red { background:rgba(239,68,68,0.12); color:var(--red); }
.b-cyan { background:rgba(6,182,212,0.12); color:var(--cyan); }

/* Buttons */
.btn { padding:6px 12px; border:1px solid var(--border); background:var(--bg3); color:var(--text); border-radius:6px; cursor:pointer; font-size:11px; }
.btn:hover { border-color:var(--blue); }
.btn-p { background:var(--blue); border-color:var(--blue); color:#fff; }
.actions { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }

/* Filter */
.filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.filter-bar input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:6px; font-size:12px; width:200px; }
.filter-bar select { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:6px 8px; border-radius:6px; font-size:12px; }

/* Table */
table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:left; padding:8px; color:var(--text2); border-bottom:1px solid var(--border); font-weight:500; }
td { padding:8px; border-bottom:1px solid var(--border); }
tr:hover { background:var(--bg3); }

/* Run cards */
.run { padding:10px 0; border-bottom:1px solid var(--border); }
.run:last-child { border-bottom:none; }

/* Dot */
.dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; }

/* Expand */
.expandable { cursor:pointer; }
.expand-content { display:none; margin-top:8px; padding:10px; background:var(--bg); border-radius:6px; font-size:12px; line-height:1.6; color:var(--text2); }
.expand-content.open { display:block; }

/* Scroll */
.scroll { max-height:600px; overflow-y:auto; }

/* Prob color */
.prob-high { color:var(--green); }
.prob-mid { color:var(--amber); }
.prob-low { color:var(--red); }
.prob-neutral { color:var(--text2); }
</style>
</head>
<body>
<div class="shell">
  <nav>
    <div class="logo">FutureSight<span>prediction platform</span></div>
    <a class="nav-item active" data-tab="overview" onclick="showTab('overview')">Overview</a>
    <a class="nav-item" data-tab="predictions" onclick="showTab('predictions')">Predictions</a>
    <a class="nav-item" data-tab="markets" onclick="showTab('markets')">Markets</a>
    <a class="nav-item" data-tab="news" onclick="showTab('news')">News & Social</a>
    <a class="nav-item" data-tab="methods" onclick="showTab('methods')">Methods</a>
    <a class="nav-item" data-tab="graph" onclick="showTab('graph')">Event Graph</a>
    <a class="nav-item" data-tab="insights" onclick="showTab('insights')">Insights</a>
    <a class="nav-item" data-tab="indicators" onclick="showTab('indicators')">Indicators</a>
    <a class="nav-item" data-tab="interests" onclick="showTab('interests')">Interests</a>
    <a class="nav-item" data-tab="patterns" onclick="showTab('patterns')">Patterns</a>
    <a class="nav-item" data-tab="agents" onclick="showTab('agents')">Agent Runs</a>
    <a class="nav-item" data-tab="scratchpad" onclick="showTab('scratchpad')">Scratchpad</a>
    <a class="nav-item" data-tab="evolution" onclick="showTab('evolution')">Evolution</a>
  </nav>
  <main>
    <div id="tab-overview" class="tab-content"></div>
    <div id="tab-predictions" class="tab-content" style="display:none"></div>
    <div id="tab-markets" class="tab-content" style="display:none"></div>
    <div id="tab-news" class="tab-content" style="display:none"></div>
    <div id="tab-methods" class="tab-content" style="display:none"></div>
    <div id="tab-graph" class="tab-content" style="display:none"></div>
    <div id="tab-insights" class="tab-content" style="display:none"></div>
    <div id="tab-indicators" class="tab-content" style="display:none"></div>
    <div id="tab-interests" class="tab-content" style="display:none"></div>
    <div id="tab-patterns" class="tab-content" style="display:none"></div>
    <div id="tab-agents" class="tab-content" style="display:none"></div>
    <div id="tab-scratchpad" class="tab-content" style="display:none"></div>
    <div id="tab-evolution" class="tab-content" style="display:none"></div>
  </main>
</div>

<script>
const API = '';

async function api(path) { return (await fetch(API + path)).json(); }
async function post(path) { return (await fetch(API + path, {method:'POST'})).json(); }

function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.getElementById('tab-' + name).style.display = 'block';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === name));
  loaders[name]?.();
}

// Helpers
const pct = v => v != null ? (v * 100).toFixed(1) + '%' : '—';
const num = v => v != null ? v.toLocaleString() : '—';
const score = v => v != null ? v.toFixed(3) : '—';
function ago(dt) {
  if (!dt) return '—';
  const s = Math.floor((Date.now() - new Date(dt)) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function daysLeft(dt) {
  if (!dt) return '';
  const d = Math.ceil((new Date(dt) - Date.now()) / 86400000);
  if (d < 0) return 'expired';
  if (d === 0) return 'today';
  if (d === 1) return 'tomorrow';
  return d + 'd left';
}
function probColor(p) {
  if (p == null) return 'prob-neutral';
  if (p >= 0.7) return 'prob-high';
  if (p >= 0.3) return 'prob-mid';
  return 'prob-low';
}
function platformBadge(p) {
  const c = {polymarket:'b-purple', manifold:'b-green', gdelt:'b-cyan', reddit:'b-amber'}[p] || 'b-blue';
  return `<span class="badge ${c}">${p}</span>`;
}
function barClass(p) {
  return {polymarket:'var(--purple)', manifold:'var(--green)', gdelt:'var(--cyan)', reddit:'var(--amber)'}[p] || 'var(--text2)';
}

function parseOutcomes(raw) {
  if (!raw) return [];
  let outcomes = raw.outcomes || [];
  let prices = raw.outcomePrices || [];
  if (typeof outcomes === 'string') try { outcomes = JSON.parse(outcomes); } catch(e) { outcomes = []; }
  if (typeof prices === 'string') try { prices = JSON.parse(prices); } catch(e) { prices = []; }
  return outcomes.map((o, i) => ({
    label: o,
    price: prices[i] ? parseFloat(prices[i]) : null
  }));
}

function renderMarket(s) {
  const p = s.current_market_probability;
  const outcomes = parseOutcomes(s.raw_data);
  const vol = s.raw_data?.volumeNum;
  const liq = s.raw_data?.liquidityNum;

  const outcomesHtml = outcomes.length ? `<div class="outcomes">${outcomes.map((o, i) =>
    `<span class="outcome ${i === 0 ? 'outcome-yes' : 'outcome-no'}">${o.label}: ${o.price != null ? (o.price * 100).toFixed(1) + '%' : '?'}</span>`
  ).join('')}</div>` : '';

  const desc = s.description || s.raw_data?.description || '';

  return `
    <div class="market expandable" onclick="this.querySelector('.expand-content')?.classList.toggle('open')">
      <div class="market-prob">
        <div class="pct ${probColor(p)}">${p != null ? (p*100).toFixed(0) : '?'}<span style="font-size:12px">%</span></div>
        <div class="dir">${daysLeft(s.resolution_date || s.raw_data?.endDate)}</div>
      </div>
      <div class="market-body">
        <div class="market-title">${s.title}</div>
        ${outcomesHtml}
        <div class="market-meta">
          ${platformBadge(s.platform)}
          ${s.category ? `<span class="badge b-blue">${s.category}</span>` : ''}
          ${vol ? `<span style="font-size:10px;color:var(--text3)">Vol: $${vol >= 1000 ? (vol/1000).toFixed(1)+'k' : vol.toFixed(0)}</span>` : ''}
          ${liq ? `<span style="font-size:10px;color:var(--text3)">Liq: $${liq >= 1000 ? (liq/1000).toFixed(1)+'k' : liq.toFixed(0)}</span>` : ''}
          <span style="font-size:10px;color:var(--text3)">${ago(s.updated_at)}</span>
        </div>
        ${desc ? `<div class="expand-content"><strong>Description:</strong><br>${desc}</div>` : ''}
      </div>
    </div>`;
}

function renderSentimentCard(s) {
  const color = s.avg_sentiment > 0.05 ? 'var(--green)' : s.avg_sentiment < -0.05 ? 'var(--red)' : 'var(--text2)';
  const sign = s.avg_sentiment > 0 ? '+' : '';
  const labels = Object.entries(s.by_label || {}).map(function([label, count]) {
    const cls = label === 'positive' ? 'b-green' : label === 'negative' ? 'b-red' : 'b-blue';
    return '<span class="badge ' + cls + '">' + label + ': ' + count + '</span>';
  }).join('');
  return '<div style="font-size:24px;font-weight:700;color:' + color + ';margin-bottom:8px">'
    + sign + (s.avg_sentiment?.toFixed(3) || '0.000')
    + ' <span style="font-size:11px;font-weight:400;color:var(--text2)">avg sentiment</span></div>'
    + '<div style="font-size:12px;color:var(--text2);margin-bottom:8px">' + s.total_scored + '/' + s.total_sources + ' sources scored (' + s.coverage_pct + '%)</div>'
    + '<div style="display:flex;gap:6px;flex-wrap:wrap">' + labels + '</div>';
}

function sentimentBadge(raw) {
  if (!raw || raw.sentiment == null) return '';
  const s = raw.sentiment;
  const label = raw.sentiment_label || 'neutral';
  const cls = label === 'positive' ? 'b-green' : label === 'negative' ? 'b-red' : 'b-blue';
  return `<span class="badge ${cls}">${s > 0 ? '+' : ''}${s.toFixed(2)} ${label}</span>`;
}

function renderNewsItem(s) {
  const desc = s.description || s.raw_data?.description || '';
  return `
    <div class="market expandable" onclick="this.querySelector('.expand-content')?.classList.toggle('open')">
      <div class="market-body" style="padding-left:0">
        <div class="market-title">${s.title}</div>
        ${desc ? `<div class="market-desc">${desc}</div>` : ''}
        <div class="market-meta">
          ${platformBadge(s.platform)}
          ${sentimentBadge(s.raw_data)}
          ${s.category ? `<span class="badge b-blue">${s.category}</span>` : ''}
          <span style="font-size:10px;color:var(--text3)">${ago(s.updated_at)}</span>
        </div>
        ${s.raw_data?.url ? `<div class="expand-content"><a href="${s.raw_data.url}" target="_blank" style="color:var(--blue)">${s.raw_data.url}</a><br><br>${desc}</div>` : (desc ? `<div class="expand-content">${desc}</div>` : '')}
      </div>
    </div>`;
}

// ── Loaders ──
const loaders = {};

loaders.overview = async () => {
  const [stats, dashStats, reliability, topMarkets, recentNews, predictions, sentiment] = await Promise.all([
    api('/api/meta/stats'),
    api('/api/dashboard/stats'),
    api('/api/meta/sources/reliability'),
    api('/api/dashboard/sources?platform=polymarket&has_probability=true&limit=8'),
    api('/api/dashboard/sources?platform=gdelt&limit=5'),
    api('/api/predictions/?limit=5'),
    api('/api/dashboard/sentiment'),
  ]);
  const platforms = stats.platforms || {};
  const maxP = Math.max(...Object.values(platforms), 1);

  const bars = Object.entries(platforms).map(([p, c]) =>
    `<div class="bar-row"><span class="name">${p}</span><div class="bar-bg"><div class="bar-fill" style="width:${c/maxP*100}%;background:${barClass(p)}"></div></div><span class="count">${c}</span></div>`
  ).join('');

  const relBars = reliability.map(r =>
    `<div class="bar-row"><span class="name">${r.platform}</span><div class="bar-bg"><div class="bar-fill" style="width:${r.reliability_score*100}%;background:${r.reliability_score>=0.7?'var(--green)':r.reliability_score>=0.4?'var(--amber)':'var(--red)'}"></div></div><span class="count">${pct(r.reliability_score)}</span></div>`
  ).join('') || '<div style="color:var(--text3);font-size:12px">No data yet</div>';

  document.getElementById('tab-overview').innerHTML = `
    <h2 style="margin-bottom:4px">Dashboard</h2>
    <p style="color:var(--text2);margin-bottom:16px;font-size:13px">Aggregating prediction markets, news, and social data to forecast future events.</p>

    <div class="stats">
      <div class="card stat"><div class="value">${num(stats.total_sources)}</div><div class="label">Data Sources</div></div>
      <div class="card stat"><div class="value">${num(stats.total_predictions)}</div><div class="label">Predictions</div></div>
      <div class="card stat"><div class="value">${num(stats.scored_predictions)}</div><div class="label">Scored</div></div>
      <div class="card stat"><div class="value">${score(stats.avg_brier_score)}</div><div class="label">Avg Brier</div></div>
    </div>

    <div class="actions">
      <button class="btn btn-p" onclick="doAction(this,'collect','all')">Collect All</button>
      <button class="btn" onclick="doAction(this,'collect','polymarket')">Polymarket</button>
      <button class="btn" onclick="doAction(this,'collect','manifold')">Manifold</button>
      <button class="btn" onclick="doAction(this,'collect','gdelt')">GDELT</button>
      <button class="btn" onclick="doAction(this,'collect','reddit')">Reddit</button>
      <button class="btn btn-p" onclick="doAction(this,'generate-predictions','')">Generate Predictions</button>
      <button class="btn btn-p" onclick="doAction(this,'build-graph','')">Build Graph</button>
      <button class="btn btn-p" onclick="doAction(this,'analyze-sentiment','')">Analyze Sentiment</button>
      <button class="btn btn-p" onclick="doAction(this,'match-sources','')">Match Sources</button>
      <button class="btn btn-p" onclick="doAction(this,'score-predictions','')">Score Predictions</button>
      <button class="btn" onclick="doAction(this,'trigger','source_evaluator')">Evaluate Sources</button>
      <button class="btn btn-p" onclick="doAction(this,'run-pipeline','')">Run Full Pipeline</button>
    </div>

    <div class="grid-2">
      <div>
        <div class="card">
          <h3>Top Markets</h3>
          <div class="scroll" style="max-height:450px">
            ${topMarkets.map(renderMarket).join('') || '<div style="color:var(--text3)">No markets yet — click Collect</div>'}
          </div>
        </div>
        <div class="card">
          <h3>Recent News</h3>
          ${recentNews.map(renderNewsItem).join('') || '<div style="color:var(--text3)">No news yet</div>'}
        </div>
      </div>
      <div>
        <div class="card">
          <h3>Latest Predictions</h3>
          ${predictions.length ? predictions.map(p => `
            <div style="display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
              <div class="pct ${probColor(p.confidence)}" style="font-size:16px;font-weight:700;min-width:45px;text-align:center">${(p.confidence*100).toFixed(0)}%</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.prediction_text}</div>
                <div style="font-size:10px;color:var(--text3)"><span class="badge b-${p.time_horizon==='short'?'red':p.time_horizon==='long'?'purple':'amber'}" style="font-size:9px">${p.time_horizon}</span> ${ago(p.created_at)}</div>
              </div>
            </div>
          `).join('') : '<div style="color:var(--text3);font-size:12px">No predictions yet</div>'}
        </div>
        <div class="card">
          <h3>Sources by Platform</h3>
          ${bars}
        </div>
        <div class="card">
          <h3>Source Reliability</h3>
          ${relBars}
        </div>
        <div class="card">
          <h3>Sentiment Analysis</h3>
          ${sentiment.total_scored > 0 ? renderSentimentCard(sentiment) : '<div style="color:var(--text3);font-size:12px">No sentiment data yet</div>'}
        </div>
        <div class="card">
          <h3>System</h3>
          <div style="font-size:12px;color:var(--text2);line-height:2.2">
            <div><span class="dot" style="background:var(--green)"></span>Agents: ${num(dashStats.total_agents)}</div>
            <div><span class="dot" style="background:var(--green)"></span>Event Nodes: ${num(dashStats.total_event_nodes)}</div>
            <div><span class="dot" style="background:var(--green)"></span>Event Edges: ${num(dashStats.total_event_edges)}</div>
            <div><span class="dot" style="background:var(--cyan)"></span>Predictions: ${num(dashStats.total_predictions)}</div>
          </div>
        </div>
      </div>
    </div>
  `;
};

// ── Predictions ──
loaders.predictions = async () => {
  const preds = await api('/api/predictions/?limit=100');
  // Sort by confidence desc
  preds.sort((a,b) => b.confidence - a.confidence);

  const el = document.getElementById('tab-predictions');
  el.innerHTML = `
    <h2 style="margin-bottom:16px">Predictions</h2>
    <div class="filter-bar">
      <input id="pred-search" placeholder="Search predictions..." oninput="filterPredictions()">
      <select id="pred-horizon" onchange="filterPredictions()">
        <option value="">All horizons</option>
        <option value="short">Short-term</option>
        <option value="medium">Medium-term</option>
        <option value="long">Long-term</option>
      </select>
      <button class="btn btn-p" onclick="doAction(this,'generate-predictions','').then(()=>loaders.predictions())">Regenerate</button>
    </div>
    <div class="card"><div id="pred-list" class="scroll" style="max-height:700px">${renderPredictions(preds)}</div></div>
  `;
  window._allPreds = preds;
};

function renderPredictions(preds) {
  if (!preds.length) return '<div style="color:var(--text3);padding:20px">No predictions yet. Click "Generate Predictions" on the Overview tab.</div>';
  return preds.map(p => {
    const ds = p.data_signals || {};
    const factors = ds.factors || [];
    const sources = ds.sources || [];
    const tools = ds.tools_used || [];

    const factorsHtml = factors.map(f => {
      const icon = f.direction === 'supports' ? '&#9650;' : f.direction === 'contradicts' ? '&#9660;' : '&#9644;';
      const color = f.direction === 'supports' ? 'var(--green)' : f.direction === 'contradicts' ? 'var(--red)' : 'var(--text2)';
      return `<div style="margin-bottom:6px">
        <span style="color:${color}">${icon}</span>
        <span style="font-size:12px">${f.signal}</span>
        <span style="font-size:10px;color:var(--text3);margin-left:6px">weight: ${(f.weight*100).toFixed(0)}%</span>
        ${f.counterfactual ? `<div style="font-size:11px;color:var(--text3);font-style:italic;margin-left:16px">${f.counterfactual}</div>` : ''}
      </div>`;
    }).join('');

    const sourcesHtml = sources.map(s => `
      <div style="font-size:12px;margin-bottom:4px">
        <span style="font-weight:500">${s.name}</span>
        ${platformBadge(s.platform)}
        <span style="color:var(--text3);font-size:11px">${s.signal}</span>
      </div>
    `).join('');

    const toolsHtml = tools.map(t => `<span class="badge b-blue" style="margin-right:3px">${t.replace(/_/g,' ')}</span>`).join('');

    return `
      <div class="market expandable" onclick="this.querySelector('.expand-content')?.classList.toggle('open')">
        <div class="market-prob">
          <div class="pct ${probColor(p.confidence)}">${(p.confidence*100).toFixed(0)}<span style="font-size:12px">%</span></div>
          <div class="dir">${p.predicted_outcome || ''}</div>
        </div>
        <div class="market-body">
          <div class="market-title">${p.prediction_text}</div>
          <div class="market-meta">
            <span class="badge b-${p.time_horizon==='short'?'red':p.time_horizon==='long'?'purple':'amber'}">${p.time_horizon}-term</span>
            ${toolsHtml}
            <span style="font-size:10px;color:var(--text3)">${ago(p.created_at)}</span>
          </div>
          <div class="expand-content">
            ${p.reasoning ? `<div style="margin-bottom:10px"><strong>Reasoning:</strong><br>${p.reasoning}</div>` : ''}
            ${factorsHtml ? `<div style="margin-bottom:10px"><strong>Key Factors:</strong><br>${factorsHtml}</div>` : ''}
            ${sourcesHtml ? `<div style="margin-bottom:10px"><strong>Sources:</strong><br>${sourcesHtml}</div>` : ''}
            ${ds.tool_outputs ? `<button class="btn" onclick="event.stopPropagation();showCounterfactual('${p.id}')" style="font-size:11px;padding:4px 10px;margin-top:4px">What-If Analysis</button>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function filterPredictions() {
  const q = (document.getElementById('pred-search')?.value || '').toLowerCase();
  const h = document.getElementById('pred-horizon')?.value || '';
  let filtered = window._allPreds || [];
  if (q) filtered = filtered.filter(p => p.prediction_text.toLowerCase().includes(q));
  if (h) filtered = filtered.filter(p => p.time_horizon === h);
  document.getElementById('pred-list').innerHTML = renderPredictions(filtered);
}

// ── Event Graph ──
loaders.graph = async () => {
  const typeColor = {geopolitical:'#ef4444',economic:'#f59e0b',tech:'#06b6d4',social:'#a855f7',environmental:'#22c55e'};
  const relColor = {causes:'#22c55e',amplifies:'#3b82f6',mitigates:'#ef4444',correlates:'#6b7280',precedes:'#f59e0b'};
  let cy = null;
  let currentMode = 'hubs';

  const container = document.getElementById('tab-graph');
  container.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:4px" id="graph-mode-btns">
        <button class="btn btn-p btn-sm" data-mode="hubs" onclick="switchGraphMode('hubs')">Hubs</button>
        <button class="btn btn-sm" data-mode="clusters" onclick="switchGraphMode('clusters')">Clusters</button>
        <button class="btn btn-sm" data-mode="search" onclick="switchGraphMode('search')">Search</button>
      </div>
      <div style="display:flex;gap:12px;align-items:center;font-size:11px">
        ${Object.entries(typeColor).map(([t,c]) => '<span><span class="dot" style="background:'+c+'"></span>'+t+'</span>').join('')}
        <select id="graph-rel-filter" onchange="reloadGraph()" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px">
          <option value="">All relationships</option>
          <option value="causes">causes</option>
          <option value="amplifies">amplifies</option>
          <option value="mitigates">mitigates</option>
          <option value="correlates">correlates</option>
          <option value="precedes">precedes</option>
        </select>
        <label style="color:var(--text3)">Min str:
          <input id="graph-str-slider" type="range" min="0" max="90" value="10" onchange="reloadGraph()" style="width:80px;vertical-align:middle">
          <span id="graph-str-val">0.1</span>
        </label>
      </div>
    </div>
    <div id="graph-search-bar" style="display:none;margin-bottom:12px">
      <div style="display:flex;gap:8px;align-items:center">
        <input id="graph-search-input" type="text" placeholder="Search events..." style="flex:1;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px" oninput="debounceSearch()">
        <label style="font-size:11px;color:var(--text3)">Hops:
          <select id="graph-hops" onchange="debounceSearch()" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px;font-size:11px">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
          </select>
        </label>
        <button class="btn btn-sm" onclick="document.getElementById('graph-search-input').value='';reloadGraph()">Clear</button>
      </div>
    </div>
    <div id="cy" style="width:100%;height:500px;background:var(--bg);border:1px solid var(--border);border-radius:8px"></div>
    <div id="graph-stats" style="display:flex;gap:24px;padding:8px 0;font-size:11px;color:var(--text3)"></div>
    <div id="graph-tooltip" style="display:none;position:fixed;background:rgba(10,10,15,0.95);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;max-width:300px;z-index:1000;pointer-events:none"></div>
  `;

  function getFilters() {
    const rel = document.getElementById('graph-rel-filter')?.value || '';
    const strVal = (document.getElementById('graph-str-slider')?.value || 10) / 100;
    document.getElementById('graph-str-val').textContent = strVal.toFixed(1);
    return { rel, minStr: strVal };
  }

  function initCy(elements) {
    if (cy) cy.destroy();
    cy = cytoscape({
      container: document.getElementById('cy'),
      elements: elements,
      style: [
        { selector: 'node', style: {
          'background-color': 'data(color)',
          'label': 'data(label)',
          'font-size': '9px',
          'color': '#ccc',
          'text-outline-color': '#0a0a0f',
          'text-outline-width': 2,
          'text-valign': 'bottom',
          'text-margin-y': 4,
          'width': 'data(size)',
          'height': 'data(size)',
          'border-width': 1,
          'border-color': 'data(color)',
          'border-opacity': 0.5,
        }},
        { selector: 'node.hub', style: {
          'font-size': '10px',
          'font-weight': 'bold',
          'border-width': 2,
        }},
        { selector: 'node.cluster-node', style: {
          'shape': 'round-rectangle',
          'width': 'data(size)',
          'height': 'data(size)',
          'font-size': '14px',
          'font-weight': 'bold',
          'text-valign': 'center',
          'text-halign': 'center',
          'background-opacity': 0.3,
          'border-width': 3,
        }},
        { selector: 'node.search-match', style: {
          'border-width': 3,
          'border-color': '#4a9eff',
          'border-style': 'double',
        }},
        { selector: 'edge', style: {
          'width': 'data(width)',
          'line-color': 'data(color)',
          'target-arrow-color': 'data(color)',
          'target-arrow-shape': 'triangle',
          'curve-style': 'bezier',
          'opacity': 0.6,
          'arrow-scale': 0.8,
        }},
        { selector: 'edge.cluster-edge', style: {
          'width': 'data(width)',
          'curve-style': 'bezier',
          'line-style': 'dashed',
          'opacity': 0.8,
          'arrow-scale': 1.2,
        }},
      ],
      layout: { name: 'cose', animate: true, animationDuration: 800, nodeRepulsion: 8000, idealEdgeLength: 120, gravity: 0.3 },
      minZoom: 0.2,
      maxZoom: 5,
    });

    // Tooltips
    const tooltip = document.getElementById('graph-tooltip');
    cy.on('mouseover', 'node', e => {
      const d = e.target.data();
      tooltip.innerHTML = '<div style="font-weight:600;color:white;margin-bottom:4px">' + (d.fullTitle || d.label) + '</div>' +
        '<div style="color:#888;margin-bottom:6px">' + (d.eventType || '') + (d.confidence != null ? ' &middot; '+Math.round(d.confidence*100)+'%' : '') + '</div>' +
        '<div style="color:#aaa">Connections: ' + e.target.degree() + '</div>' +
        (d.nodeCount ? '<div style="color:#aaa">Nodes: '+d.nodeCount+' &middot; Edges: '+d.edgeCount+'</div>' : '') +
        '<div style="color:#666;margin-top:6px;font-size:10px">Click to expand</div>';
      tooltip.style.display = 'block';
    });
    cy.on('mousemove', 'node', e => {
      tooltip.style.left = e.originalEvent.clientX + 12 + 'px';
      tooltip.style.top = e.originalEvent.clientY + 12 + 'px';
    });
    cy.on('mouseout', 'node', () => { tooltip.style.display = 'none'; });

    cy.on('mouseover', 'edge', e => {
      const d = e.target.data();
      tooltip.innerHTML = '<div style="color:white">' + d.relType + '</div>' +
        '<div style="color:#aaa">Strength: ' + (d.strength != null ? (d.strength*100).toFixed(0)+'%' : d.count||'') + '</div>' +
        (d.reasoning ? '<div style="color:#666;margin-top:4px;font-size:11px">'+d.reasoning+'</div>' : '');
      tooltip.style.display = 'block';
    });
    cy.on('mousemove', 'edge', e => {
      tooltip.style.left = e.originalEvent.clientX + 12 + 'px';
      tooltip.style.top = e.originalEvent.clientY + 12 + 'px';
    });
    cy.on('mouseout', 'edge', () => { tooltip.style.display = 'none'; });

    // Click to expand
    cy.on('tap', 'node', async e => {
      const d = e.target.data();
      if (d.clusterId) {
        await loadHubs(d.clusterId);
        return;
      }
      if (!d.nodeId) return;
      const f = getFilters();
      let url = '/api/graph/node/' + d.nodeId + '/connections?depth=1&min_strength=' + f.minStr;
      if (f.rel) url += '&relationship_type=' + f.rel;
      const data = await api(url);
      const newEls = graphDataToElements(data, []);
      newEls.forEach(el => {
        if (!cy.getElementById(el.data.id).length) {
          cy.add(el);
        }
      });
      cy.layout({ name: 'cose', animate: true, animationDuration: 500, fit: false, nodeRepulsion: 6000 }).run();
      updateStats();
    });

    updateStats();
  }

  function graphDataToElements(data, hubIds) {
    const elements = [];
    const nodes = data.nodes || [];
    const edges = data.edges || [];

    const edgeCounts = {};
    edges.forEach(e => {
      edgeCounts[e.source_node_id] = (edgeCounts[e.source_node_id] || 0) + 1;
      edgeCounts[e.target_node_id] = (edgeCounts[e.target_node_id] || 0) + 1;
    });

    nodes.forEach(n => {
      const deg = edgeCounts[n.id] || 1;
      const sz = Math.min(50, 12 + deg * 3);
      const el = {
        data: {
          id: 'n-' + n.id,
          nodeId: n.id,
          label: n.title.length > 40 ? n.title.slice(0, 38) + '\u2026' : n.title,
          fullTitle: n.title,
          color: typeColor[n.event_type] || '#6b7280',
          eventType: n.event_type,
          confidence: n.confidence,
          size: sz,
        },
      };
      if (hubIds.includes(n.id)) el.classes = 'hub';
      elements.push(el);
    });

    edges.forEach(e => {
      elements.push({
        data: {
          id: 'e-' + e.id,
          source: 'n-' + e.source_node_id,
          target: 'n-' + e.target_node_id,
          relType: e.relationship_type,
          color: relColor[e.relationship_type] || '#6b7280',
          width: 1 + e.strength * 4,
          strength: e.strength,
          reasoning: e.reasoning,
        },
      });
    });

    return elements;
  }

  function updateStats() {
    const n = cy ? cy.nodes().length : 0;
    const e = cy ? cy.edges().length : 0;
    document.getElementById('graph-stats').innerHTML =
      '<span>Showing <span style="color:var(--text)">' + n + '</span> nodes</span>' +
      '<span>Edges: <span style="color:var(--text)">' + e + '</span></span>' +
      '<span style="margin-left:auto;color:var(--text3)">Pan: drag &middot; Zoom: scroll &middot; Expand: click node</span>';
  }

  window.switchGraphMode = async (mode) => {
    currentMode = mode;
    document.querySelectorAll('#graph-mode-btns button').forEach(b => {
      b.className = b.dataset.mode === mode ? 'btn btn-p btn-sm' : 'btn btn-sm';
    });
    document.getElementById('graph-search-bar').style.display = mode === 'search' ? 'block' : 'none';
    await reloadGraph();
  };

  async function loadHubs(eventType) {
    const f = getFilters();
    let url = '/api/graph/hubs?limit=20&min_strength=' + f.minStr;
    if (eventType) url += '&event_type=' + eventType;
    if (f.rel) url += '&relationship_type=' + f.rel;
    const data = await api(url);
    const hubIds = (data.nodes || []).slice(0, 20).map(n => n.id);
    const elements = graphDataToElements(data, hubIds);
    initCy(elements);
  }

  async function loadClusters() {
    const data = await api('/api/graph/clusters');
    const elements = [];

    (data.clusters || []).forEach(c => {
      const sz = Math.min(100, 30 + Math.sqrt(c.node_count) * 5);
      elements.push({
        data: {
          id: 'cluster-' + c.event_type,
          clusterId: c.event_type,
          label: c.event_type + '\n' + c.node_count + ' nodes',
          color: typeColor[c.event_type] || '#6b7280',
          eventType: c.event_type,
          size: sz,
          nodeCount: c.node_count,
          edgeCount: c.edge_count,
        },
        classes: 'cluster-node',
      });
    });

    (data.inter_cluster_edges || []).forEach((e, i) => {
      elements.push({
        data: {
          id: 'ce-' + i,
          source: 'cluster-' + e.source_type,
          target: 'cluster-' + e.target_type,
          relType: e.dominant_relationship,
          color: relColor[e.dominant_relationship] || '#6b7280',
          width: Math.min(8, 1 + Math.sqrt(e.count) * 0.5),
          count: e.count,
        },
        classes: 'cluster-edge',
      });
    });

    initCy(elements);
    cy.layout({ name: 'circle', animate: true }).run();
  }

  let searchTimeout = null;
  window.debounceSearch = () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(reloadGraph, 300);
  };

  async function loadSearch() {
    const q = document.getElementById('graph-search-input')?.value?.trim();
    if (!q || q.length < 2) {
      if (cy) cy.destroy();
      cy = null;
      updateStats();
      return;
    }
    const f = getFilters();
    const hops = document.getElementById('graph-hops')?.value || 2;
    let url = '/api/graph/search?q=' + encodeURIComponent(q) + '&hops=' + hops + '&min_strength=' + f.minStr;
    if (f.rel) url += '&relationship_type=' + f.rel;
    const data = await api(url);
    const elements = graphDataToElements(data, []);

    const qLower = q.toLowerCase();
    elements.forEach(el => {
      if (el.data.fullTitle && el.data.fullTitle.toLowerCase().includes(qLower)) {
        el.classes = (el.classes || '') + ' search-match';
      }
    });

    initCy(elements);
  }

  window.reloadGraph = async () => {
    if (currentMode === 'hubs') await loadHubs();
    else if (currentMode === 'clusters') await loadClusters();
    else if (currentMode === 'search') await loadSearch();
  };

  // Initial load
  await loadHubs();
};

loaders.indicators = async () => {

    const key = ind.source_agency + ':' + ind.series_id;
    if (!bySeries[key]) bySeries[key] = {name: ind.name, agency: ind.source_agency, region: ind.region, unit: ind.unit, series_id: ind.series_id, points: []};
    bySeries[key].points.push(ind);
  }

  const agencyColor = {FRED:'b-blue', CBS_IL:'b-cyan', WORLD_BANK:'b-green'};

  const seriesHtml = Object.entries(bySeries).map(([key, s]) => {
    const sorted = s.points.sort((a,b) => a.period.localeCompare(b.period));
    const latest = sorted[sorted.length - 1];
    const prev = sorted.length > 1 ? sorted[sorted.length - 2] : null;
    const change = prev ? ((latest.value - prev.value) / Math.abs(prev.value) * 100) : null;
    const arrow = change !== null ? (change > 0 ? '↑' : change < 0 ? '↓' : '→') : '';
    const arrowColor = change !== null ? (change > 0 ? 'var(--red)' : change < 0 ? 'var(--green)' : 'var(--text3)') : '';

    const sparkData = sorted.slice(-10).map(p => p.value);
    const sparkMin = Math.min(...sparkData);
    const sparkMax = Math.max(...sparkData);
    const sparkRange = sparkMax - sparkMin || 1;
    const sparkH = 30;
    const sparkW = 120;
    const sparkPoints = sparkData.map((v, i) => `${(i / (sparkData.length - 1)) * sparkW},${sparkH - ((v - sparkMin) / sparkRange) * sparkH}`).join(' ');

    return `
      <div class="run" style="display:flex;align-items:center;gap:16px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
          <div style="display:flex;gap:4px;margin-top:4px">
            <span class="badge ${agencyColor[s.agency]||'b-blue'}">${s.agency}</span>
            ${s.region ? `<span class="badge b-amber">${s.region}</span>` : ''}
          </div>
        </div>
        <svg width="${sparkW}" height="${sparkH}" style="flex-shrink:0">
          <polyline points="${sparkPoints}" fill="none" stroke="var(--blue)" stroke-width="1.5"/>
        </svg>
        <div style="text-align:right;flex-shrink:0;min-width:100px">
          <div style="font-size:18px;font-weight:700;color:var(--text)">${latest.value < 1000 ? latest.value.toFixed(2) : num(Math.round(latest.value))}</div>
          <div style="font-size:11px;color:var(--text2)">${s.unit || ''} · ${latest.period}</div>
          ${change !== null ? `<div style="font-size:12px;color:${arrowColor}">${arrow} ${Math.abs(change).toFixed(1)}%</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('tab-indicators').innerHTML = `
    <h2 style="margin-bottom:16px">Economic Indicators</h2>
    <div class="card">
      <h3>Tracked Series (${Object.keys(bySeries).length})</h3>
      <div class="scroll" style="max-height:600px">
        ${seriesHtml || '<div style="color:var(--text3);padding:20px;text-align:center">No indicator data yet. Click "Collect Indicators" on the Insights tab.</div>'}
      </div>
    </div>
  `;
};

async function addInterest() {
  const name = document.getElementById('int-name').value.trim();
  const cat = document.getElementById('int-cat').value.trim();
  const kw = document.getElementById('int-kw').value.split(',').map(k => k.trim()).filter(Boolean);
  const pri = document.getElementById('int-pri').value;
  const region = document.getElementById('int-region').value || null;
  const mf = document.getElementById('int-mf').value.split(',').map(k => k.trim()).filter(Boolean);
  const ind = document.getElementById('int-ind').value.split(',').map(k => k.trim()).filter(Boolean);
  if (!name || !kw.length) return alert('Name and at least one keyword required');
  await fetch('/api/interests/', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name, category: cat || null, keywords: kw, priority: pri, region, market_filters: mf.length ? mf : null, indicators: ind.length ? ind : null, enabled: true})
  });
  loaders.interests();
}

async function deleteInterest(id) {
  await fetch('/api/interests/' + id, {method:'DELETE'});
  loaders.interests();
}

async function toggleInterest(id, enabled) {
  await fetch('/api/interests/' + id, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({enabled})
  });
  loaders.interests();
}

// ── Counterfactual Modal ──
async function showCounterfactual(predId) {
  const data = await api(`/api/predictions/${predId}/counterfactual`);
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:999';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };

  const maxShift = Math.max(...data.counterfactuals.map(c => Math.abs(c.shift)), 0.01);

  modal.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:650px;width:90%;max-height:80vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="color:var(--text);font-size:16px;text-transform:none;letter-spacing:0">Counterfactual Analysis</h3>
        <span onclick="this.closest('div[style*=fixed]').remove()" style="cursor:pointer;color:var(--text3);font-size:20px">&times;</span>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.4">${data.prediction_text || ''}</div>
      <div style="font-size:14px;margin-bottom:16px">Ensemble: <b style="color:var(--blue)">${pct(data.ensemble_probability)}</b></div>
      ${data.counterfactuals?.length ? data.counterfactuals.map(c => {
        const barW = Math.abs(c.shift) / maxShift * 100;
        const color = c.shift > 0.01 ? 'var(--green)' : c.shift < -0.01 ? 'var(--red)' : 'var(--text3)';
        const arrow = c.shift > 0.01 ? '↑' : c.shift < -0.01 ? '↓' : '→';
        return `
          <div style="padding:10px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div>
                <span style="font-weight:600;font-size:13px">${c.tool}</span>
                <span style="font-size:11px;color:var(--text3);margin-left:8px">${pct(c.tool_probability)} (w=${c.tool_weight.toFixed(2)})</span>
              </div>
              <span style="color:${color};font-weight:600;font-size:13px">${arrow} ${c.shift > 0 ? '+' : ''}${(c.shift * 100).toFixed(1)}pp</span>
            </div>
            <div style="margin-top:6px;display:flex;align-items:center;gap:8px">
              <span style="font-size:11px;color:var(--text3);width:80px">Without:</span>
              <div style="flex:1;height:4px;background:var(--bg);border-radius:2px">
                <div style="width:${barW}%;height:100%;background:${color};border-radius:2px"></div>
              </div>
              <span style="font-size:11px;color:var(--text2);width:45px;text-align:right">${pct(c.without_tool)}</span>
            </div>
            ${c.signals_used?.length ? `<div style="margin-top:4px;font-size:10px;color:var(--text3)">Signals: ${c.signals_used.join(', ')}</div>` : ''}
          </div>`;
      }).join('') : '<div style="color:var(--text3);padding:12px">No per-tool data available for this prediction.</div>'}
    </div>
  `;
  document.body.appendChild(modal);
}

                <span style="font-size:12px;margin-left:6px">Gen ${g.generation}</span>
              </div>
              <span style="font-size:10px;color:var(--text3)">${ago(g.created_at)}</span>
            </div>
            <div style="display:flex;gap:16px;margin-top:6px;font-size:12px">
              <span><span style="color:var(--text2)">Fitness:</span> ${fitnessDisplay(g.fitness)}</span>
              <span><span style="color:var(--text2)">Scored:</span> ${g.scored_predictions}</span>
              <span><span style="color:var(--text2)">Params:</span> ${g.param_count}</span>
            </div>
            ${g.notes ? `<div style="font-size:11px;color:var(--text3);margin-top:4px">${g.notes}</div>` : ''}
          </div>
        `).join('') || '<div style="color:var(--text3)">No genomes yet</div>'}</div>
      </div>

      <div class="card">
        <h3>Evolution History</h3>
        <div class="scroll">${(history || []).map(r => `
          <div class="run">
            <div style="display:flex;justify-content:space-between">
              <span style="font-size:12px;font-weight:600">Gen ${r.generation}</span>
              <span style="font-size:10px;color:var(--text3)">${ago(r.created_at)}</span>
            </div>
            <div style="font-size:11px;color:var(--text2);margin-top:4px">
              Created: ${r.candidates_created} | Retired: ${r.candidates_retired} | Promoted: ${r.candidates_promoted}
              ${r.champion_fitness != null ? ` | Champion Brier: ${r.champion_fitness.toFixed(4)}` : ''}
            </div>
          </div>
        `).join('') || '<div style="color:var(--text3)">No evolution runs yet</div>'}</div>
      </div>
    </div>
  `;
};

async function doEvolution(btn) {
  const orig = btn.textContent;
  btn.textContent = '...'; btn.disabled = true;
  try {
    await post('/api/evolution/evolve');
    btn.textContent = 'Done';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; loaders.evolution(); }, 1000);
  } catch(e) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
  }
}

async function doBacktest(btn) {
  const orig = btn.textContent;
  btn.textContent = 'Running...'; btn.disabled = true;
  try {
    const r = await (await fetch('/api/evolution/backtest?generations=10&candidates=5', {method:'POST'})).json();
    const res = r.result || {};
    btn.textContent = 'Done';
    const improved = res.total_improvement || 0;
    const gens = res.generations_run || 0;
    const evolved = Object.keys(res.evolved_params || {}).length;
    alert(`Backtest complete!\n\n${gens} generations on ${res.dataset_size} resolved markets\nBrier improvement: ${improved.toFixed(4)}\nFinal champion: gen ${res.final_champion?.generation}, Brier ${res.final_champion?.fitness}\nEvolved ${evolved} params from defaults`);
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; loaders.evolution(); }, 1000);
  } catch(e) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
  }
}

async function doProposeMutations(btn) {
  const orig = btn.textContent;
  btn.textContent = '...'; btn.disabled = true;
  try {
    const r = await post('/api/evolution/propose-mutations');
    btn.textContent = 'Done';
    if (r.proposed_mutations) {
      const lines = r.proposed_mutations.map(m => `${m.param}: ${m.value} — ${m.reason}`).join('\n');
      alert('LLM Proposed Mutations:\n\n' + lines);
    } else {
      alert(r.message || 'No mutations proposed');
    }
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1200);
  } catch(e) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
  }
}

// ── Actions ──
async function doAction(btn, type, name) {
  const orig = btn.textContent;
  btn.textContent = '...';
  btn.disabled = true;
  try {
    let path;
    if (type === 'collect') path = `/api/meta/collect/${name}`;
    else if (type === 'trigger') path = `/api/meta/trigger/${name}`;
    else path = `/api/meta/${type}`;
    await post(path);
    btn.textContent = 'Done';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1200);
    if (document.querySelector('.nav-item.active')?.dataset.tab === 'overview') loaders.overview();
  } catch(e) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
  }
}

// Auto-refresh every 60s when on overview tab
let _refreshInterval = null;
function startAutoRefresh() {
  if (_refreshInterval) clearInterval(_refreshInterval);
  _refreshInterval = setInterval(() => {
    const active = document.querySelector('.nav-item.active')?.dataset.tab;
    if (active === 'overview') loaders.overview();
  }, 60000);
}

// Init
loaders.overview();
startAutoRefresh();
</script>
</body>
</html>
